{{ define "nav" }}
{{ if .User }}
<nav id="site-nav" class="bg-secondary" hx-swap-oob="outerHTML">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 items-center justify-between">
            <div class="flex items-center">
                <div class="shrink-0">
                    <span class="text-white font-bold text-xl">RSS Print</span>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4" hx-boost="true" hx-target="#page-content" hx-swap="innerHTML" hx-push-url="true">
                        <a href="/" class="nav-link" {{ if eq .Path "/" }}aria-current="page"{{ end }}>Dashboard</a>
                        <a href="/feeds" class="nav-link" {{ if or (eq .Path "/feeds") (eq .Path "/feed") }}aria-current="page"{{ end }}>Feeds</a>
                        <a href="/printers" class="nav-link" {{ if eq .Path "/printers" }}aria-current="page"{{ end }}>Printers</a>
                    </div>
                </div>
            </div>
            <div class="hidden md:block">
                <div class="ml-4 flex items-center md:ml-6">
                    <span class="text-white/70 mr-4">{{ .User.Username }}</span>
                    <form action="/logout" method="POST">
                        <button type="submit" class="nav-link">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>
{{ end }}
{{ end }}

<!DOCTYPE html>
<html lang="en" class="h-full bg-surface-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Auto-Print Server</title>
    <meta name="description" content="RSS Auto-Print Server">
    <link href="/static/css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
        integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
        crossorigin="anonymous"></script>
</head>

<body class="h-full">
    <div class="min-h-full">
        <!-- Navigation -->
        {{ template "nav" . }}

        <main>
            <div id="page-content" class="mx-auto max-w-7xl py-6 sm:px-6 lg:px-8">
                {{ template "content" . }}
            </div>
        </main>
    </div>
</body>

</html>
